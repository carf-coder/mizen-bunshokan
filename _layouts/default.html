<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ja' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <p class="site-desc">{{ site.description }}</p>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">本館</a>
        <a href="{{ '/mizenran/' | relative_url }}">別館</a>
        <a href="{{ '/mulenga/' | relative_url }}">已然図書館</a>
        <a href="{{ '/science/' | relative_url }}">科学者の助手</a>
        <a href="{{ '/about/' | relative_url }}">この文書館について</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <article class="doc">
      {% if page.title %}{% unless content contains "<h1" %}<h1>{{ page.title }}</h1>{% endunless %}{% endif %}
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p><a href="{{ '/about/' | relative_url }}">AI利用の開示について</a> ・ <a href="{{ '/feed.xml' | relative_url }}">RSS</a></p>
      <p class="fine">開架時刻 毎朝(不定期・自動)</p>
    </div>
  </footer>

  <script data-goatcounter="https://mizen-bunshokan.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
